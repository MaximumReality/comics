<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mochkil's Snack Attack: Crazy Cauliflower Pizza</title>
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-pink: #ff00ff;
            --terminal-green: #00ffcc;
        }

        body {
            background-color: #050505;
            color: white;
            font-family: 'Courier New', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #comic-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 95%;
            max-width: 600px;
            margin-top: 20px;
            padding-bottom: 100px;
        }

        .panel {
            width: 100%;
            border: 2px solid var(--neon-cyan);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .panel.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .panel img {
            width: 100%;
            display: block;
        }

        .caption {
            position: absolute;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            width: 100%;
            padding: 5px;
            font-size: 11px;
            color: var(--neon-cyan);
            text-align: center;
            box-sizing: border-box;
        }

        /* The Recipe Card Style */
        #recipe-card {
            position: fixed;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background: rgba(0, 15, 15, 0.98);
            border: 3px double var(--neon-cyan);
            padding: 20px;
            transition: bottom 0.8s ease-out;
            z-index: 1000;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        #recipe-card.active {
            bottom: 20px;
        }

        h2 { color: var(--neon-cyan); margin-top: 0; }
        #chaos-rating { color: var(--neon-pink); font-weight: bold; }
        ul, ol { padding-left: 20px; font-size: 14px; line-height: 1.4; }
        li { margin-bottom: 8px; }

        .azul-error {
            position: absolute;
            top: 20%;
            left: 10%;
            background: rgba(255, 0, 0, 0.2);
            color: #ff0000;
            padding: 5px;
            border: 1px solid #ff0000;
            font-size: 10px;
            animation: blink 0.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        button {
            width: 100%;
            background: var(--neon-pink);
            color: white;
            border: none;
            padding: 12px;
            font-family: inherit;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="comic-container"></div>

    <div id="recipe-card">
        <div style="font-size: 10px; color: var(--terminal-green);">[SYSTEM: DATA_RECOVERED]</div>
        <h2 id="recipe-title"></h2>
        <p id="chaos-rating"></p>
        <p><strong>INGREDIENTS:</strong></p>
        <ul id="ingredients-list"></ul>
        <p><strong>INSTRUCTIONS:</strong></p>
        <ol id="instructions-list"></ol>
        <button onclick="location.reload()">RE-WATCH CHAOS 🔄</button>
    </div>

    <script>
        const recipeData = {
            recipeName: "Crazy Cauliflower Pizza 🍕✨",
            chaosLevel: "9.8/10 (High Splash Risk)",
            ingredients: [
                "1 head of cauliflower (chopped & riced)",
                "1 cup grated vegan mozzarella (the GOAT)",
                "1/4 cup olive oil",
                "2 cloves garlic (minced by claws)",
                "1 tsp dried oregano",
                "Toppings: Olives & Artichokes (Iconic status)"
            ],
            instructions: [
                "RICE REVOLUTION: Blend cauliflower into 'snow' at 1000% speed.",
                "THE SQUEEZE: Wring out every drop of water. Watch out for Azul-bots! 💦",
                "CRUST CREATION: Mix rice, oil, garlic, and seasoning. Shape into a circle.",
                "BAKE PHASE 1: 425°F for 15-20 mins until golden.",
                "TOP WITH LOVE: Pile on the vegan cheese and veggies.",
                "DEVOUR: Bake 5-7 more mins until bubbly. Eat with gluttony! 👑"
            ]
        };

        const captions = [
            "Rice Revolution! This blender is on 1000% speed. 🥦🌪️",
            "SPLAT! Just short-circuited the Azul-bot. Oops. 💦🤖",
            "Spice squad dance! Prismatic flavors only. 🧀✨",
            "Masterpiece status: UNLOCKED. Devour! 🍕👑"
        ];

        const container = document.getElementById('comic-container');

        // Create panels
        for(let i=0; i<4; i++) {
            const panel = document.createElement('div');
            panel.className = 'panel';
            panel.id = `p${i}`;
            
            // Special error overlay for panel 1
            const errorOverlay = (i === 1) ? '<div class="azul-error">ERROR 404: WATER DETECTED</div>' : '';
            
            panel.innerHTML = `
                <img src="pizza_panel${i}${i === 3 ? '.PNG' : '.jpg'}" alt="Panel ${i+1}">
                ${errorOverlay}
                <div class="caption">${captions[i]}</div>
            `;
            container.appendChild(panel);
        }

        function showPanel(index) {
            if (index < 4) { 
                const currentPanel = document.getElementById(`p${index}`);
                if (currentPanel) {
                    currentPanel.classList.add('visible');
                    setTimeout(() => showPanel(index + 1), 3000);
                }
            } else {
                setTimeout(revealRecipe, 1000); 
            }
        }

        function revealRecipe() {
            document.getElementById('recipe-title').innerText = recipeData.recipeName;
            document.getElementById('chaos-rating').innerText = `CHAOS LEVEL: ${recipeData.chaosLevel}`;
            
            const ingList = document.getElementById('ingredients-list');
            recipeData.ingredients.forEach(ing => {
                let li = document.createElement('li');
                li.innerText = ing;
                ingList.appendChild(li);
            });

            const instList = document.getElementById('instructions-list');
            recipeData.instructions.forEach(step => {
                let li = document.createElement('li');
                li.innerText = step;
                instList.appendChild(li);
            });

            document.getElementById('recipe-card').classList.add('active'); 
        }

        window.onload = () => setTimeout(() => showPanel(0), 1000);
    </script>
</body>
</html>
